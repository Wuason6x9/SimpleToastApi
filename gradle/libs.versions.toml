bundle1204 = "1.20.4-R0.1-SNAPSHOT"
bundle1206 = "1.20.6-R0.1-SNAPSHOT"
bundle1211 = "1.21.1-R0.1-SNAPSHOT"
bundle1213 = "1.21.3-R0.1-SNAPSHOT"
