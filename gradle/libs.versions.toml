[libraries]
## Spigot API
spigot-api = { module = "org.spigotmc:spigot-api", version.ref = "spigot" }

## Kyori Adventure
adventure-minimessage = { module = "net.kyori:adventure-text-minimessage", version.ref = "adventure" }
adventure-gson = { module = "net.kyori:adventure-text-serializer-gson", version.ref = "adventure" }
adventure-legacy = { module = "net.kyori:adventure-text-serializer-legacy", version.ref = "adventure" }
viaversion = { module = "com.viaversion:viaversion-api", version.ref = "viaversion" }
protocolLib = { module = "net.dmulloy2:ProtocolLib", version.ref = "protocolLib" }
packetevents = { module = "com.github.retrooper:packetevents-spigot", version.ref = "packetevents" }

## Testing
junit-jupiter = { module = "org.junit.jupiter:junit-jupiter", version.ref = "junit" }
junit-launcher = { module = "org.junit.platform:junit-platform-launcher" }

[plugins]
## Plugins
shadow = { id = "com.gradleup.shadow", version.ref = "shadow" }
paperweight = { id = "io.papermc.paperweight.userdev", version.ref = "paperweight" }