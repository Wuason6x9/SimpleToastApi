## NMS Paperweight Bundles
bundle1171 = "1.17.1-R0.1-SNAPSHOT"
bundle1181 = "1.18.1-R0.1-SNAPSHOT"
bundle1182 = "1.18.2-R0.1-SNAPSHOT"
